<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz Bíblico</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .menu { margin-bottom: 20px; }
    .menu button { margin: 5px; }
    .question { margin-bottom: 20px; }
    button.answer { display: block; margin: 5px 0; }
    #explanation { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Preguntas Bíblicas</h1>

  <!-- Menú de libros -->
  <div class="menu">
    <button onclick="loadQuestions('Mateo')">Mateo</button>
    <button onclick="loadQuestions('Marcos')">Marcos</button>
    <button onclick="loadQuestions('Lucas')">Lucas</button>
    <button onclick="loadQuestions('Juan')">Juan</button>
    <button onclick="loadQuestions('Hechos')">Juan</button>
    <button onclick="loadQuestions('Romanos')">Juan</button>
    <button onclick="loadQuestions('1 Corintios')">Juan</button>
    <button onclick="loadQuestions('2 Corintios')">Juan</button>
    <button onclick="loadQuestions('Gálatas')">Juan</button>
    <button onclick="loadQuestions('Efesios')">Juan</button>
    <button onclick="loadQuestions('Filipense')">Juan</button>
    <button onclick="loadQuestions('Colosenses')">Juan</button>
    <button onclick="loadQuestions('1 Tesalonicenses')">Juan</button>
    <button onclick="loadQuestions('2 Tesalonicenses')">Juan</button>
    <button onclick="loadQuestions('1 Timoteo')">Juan</button>
    <button onclick="loadQuestions('2 Timoteo')">Juan</button>
    <button onclick="loadQuestions('Tito')">Juan</button>
    <button onclick="loadQuestions('Filemón')">Juan</button>
    <button onclick="loadQuestions('Santiago')">Juan</button>
    <button onclick="loadQuestions('Hebreos')">Juan</button>
    <button onclick="loadQuestions('1 Pedro')">Juan</button>
    <button onclick="loadQuestions('2 Pedro')">Juan</button>
    <button onclick="loadQuestions('1 Juan')">Juan</button>
    <button onclick="loadQuestions('2 Juan')">Juan</button>
    <button onclick="loadQuestions('3 Juan')">Juan</button>
    <button onclick="loadQuestions('Judas')">Juan</button>
    <button onclick="loadQuestions('Apocalipsis')">Juan</button>
  </div>

  <!-- Contenedor de preguntas -->
  <div id="quiz"></div>

  <script>
    // Preguntas organizadas por libro
    const questions = {
      "Mateo": [
        {
          q: "¿Cómo le habló el ángel a José?",
          options: ["En una visión", "En un sueño", "Cara a cara"],
          correct: 1,
          explanation: "Correcto ✅: El ángel se le apareció en un sueño (Mateo 1:20)."
        }
      ],
      "Marcos": [
        {
          q: "¿Quién bautizó a Jesús?",
          options: ["Pedro", "Juan el Bautista", "Andrés"],
          correct: 1,
          explanation: "Correcto ✅: Juan el Bautista lo bautizó en el Jordán."
        }
      ]
      // Añade más libros y preguntas aquí
    };

    function loadQuestions(book) {
      const quizDiv = document.getElementById('quiz');
      quizDiv.innerHTML = `<h2>${book}</h2>`;
      questions[book].forEach((item, index) => {
        let html = `<div class="question"><p>${item.q}</p>`;
        item.options.forEach((opt, i) => {
          html += `<button class="answer" onclick="checkAnswer('${book}',${index},${i})">${opt}</button>`;
        });
        html += `</div>`;
        quizDiv.innerHTML += html;
      });
    }

    function checkAnswer(book, qIndex, optIndex) {
      const item = questions[book][qIndex];
      let explanation = document.getElementById('explanation');
      if(optIndex === item.correct) {
        explanation.innerText = item.explanation;
      } else {
        explanation.innerText = "Incorrecto ❌. " + item.explanation;
      }
    }
  </script>
</body>
</html>
