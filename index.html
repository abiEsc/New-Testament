<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz Bíblico</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .menu {
      display: flex;            /* coloca los botones en fila */
      flex-wrap: wrap;          /* permite que bajen si no caben */
    }
    
    .menu button {
      background-color: #4CAF50; /* color de fondo verde */
      color: white;              /* texto blanco */
      border: none;              /* sin borde */
      padding: 10px 15px;        /* espacio interno */
      cursor: pointer;           /* mano al pasar */
      margin: 0;                 /* elimina espacio entre botones */
    }
    
    .menu button:hover {
      background-color: #45a049; /* color más oscuro al pasar */
    }

    .question { margin-bottom: 20px; }
    button.answer { display: block; margin: 5px 0; }
    .explanation { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Preguntas Bíblicas</h1>

  <!-- Menú de libros -->
  <div class="menu">
    <button onclick="loadQuestions('Mateo')">Mateo</button>
    <button onclick="loadQuestions('Marcos')">Marcos</button>
    <button onclick="loadQuestions('Lucas')">Lucas</button>
    <button onclick="loadQuestions('Juan')">Juan</button>
    <button onclick="loadQuestions('Hechos')">Hechos</button>
    <button onclick="loadQuestions('Romanos')">Romanos</button>
    <button onclick="loadQuestions('1 Corintios')">1 Corintios</button>
    <button onclick="loadQuestions('2 Corintios')">2 Corintios</button>
    <button onclick="loadQuestions('Gálatas')">Gálatas</button>
    <button onclick="loadQuestions('Efesios')">Efesios</button>
    <button onclick="loadQuestions('Filipenses')">Filipenses</button>
    <button onclick="loadQuestions('Colosenses')">Colosenses</button>
    <button onclick="loadQuestions('1 Tesalonicenses')">1 Tesalonicenses</button>
    <button onclick="loadQuestions('2 Tesalonicenses')">2 Tesalonicenses</button>
    <button onclick="loadQuestions('1 Timoteo')">1 Timoteo</button>
    <button onclick="loadQuestions('2 Timoteo')">2 Timoteo</button>
    <button onclick="loadQuestions('Tito')">Tito</button>
    <button onclick="loadQuestions('Filemón')">Filemón</button>
    <button onclick="loadQuestions('Hebreos')">Hebreos</button>
    <button onclick="loadQuestions('Santiago')">Santiago</button>
    <button onclick="loadQuestions('1 Pedro')">1 Pedro</button>
    <button onclick="loadQuestions('2 Pedro')">2 Pedro</button>
    <button onclick="loadQuestions('1 Juan')">1 Juan</button>
    <button onclick="loadQuestions('2 Juan')">2 Juan</button>
    <button onclick="loadQuestions('3 Juan')">3 Juan</button>
    <button onclick="loadQuestions('Judas')">Judas</button>
    <button onclick="loadQuestions('Apocalipsis')">Apocalipsis</button>
  </div>

  <!-- Contenedor de preguntas -->
  <div id="quiz"></div>

  <script>
    // Preguntas organizadas por libro
    const questions = {
      "Mateo": [
        {
          q: "¿Cómo le habló el ángel a José?",
          options: ["En una visión", "En un sueño", "Cara a cara"],
          correct: 1,
          explanation: "Correcto ✅: El ángel se le apareció en un sueño (Mateo 1:20)."
        },
        {
          q: "¿Donde nació Jesús?",
          options: ["En Belen de Judea", "En Nazaret", "En Capernaum"],
          correct: 0,
          explanation: "Correcto ✅: En Belen de Judea (Mateo 2:1)."
        },
        {
          q: "¿Porque se fueron los magos del Oriente sin avisar a Herodes?",
          options: ["Porque tenian prisa", "Porque les atemorizó Herodes", "Por causa de un sueño"],
          correct: 2,
          explanation: "Correcto ✅: Por causa de un sueño (Mateo )."
        },
        {
          q: "¿A dónde envió el angel, en sueños a José y su famiia?",
          options: ["A Egipto", "A Jerusalén", "A Belén"],
          correct: 0,
          explanation: "Correcto ✅: A Egipto (Mateo )."
        },
        {
          q: "¿De qué edad eran los niños que fueron asesiandos por orden de Herodes?",
          options: ["Menores de 2 años", "Recien nacidos", "Menores de 5 años"],
          correct: 0,
          explanation: "Correcto ✅: Menores de 2 años (Mateo )."
        }
      ],
      "Marcos": [
        {
          q: "¿Quién bautizó a Jesús?",
          options: ["Pedro", "Juan el Bautista", "Andrés"],
          correct: 1,
          explanation: "Correcto ✅: Juan el Bautista lo bautizó en el Jordán."
        }
      ],
      "Lucas": [],
      "Juan": [],
      "Hechos": [],
      "Romanos": [],
      "1 Corintios": [],
      "2 Corintios": [],
      "Gálatas": [],
      "Efesios": [],
      "Filipenses": [],
      "Colosenses": [],
      "1 Tesalonicenses": [],
      "2 Tesalonicenses": [],
      "1 Timoteo": [],
      "2 Timoteo": [],
      "Tito": [],
      "Filemón": [],
      "Hebreos": [],
      "Santiago": [],
      "1 Pedro": [],
      "2 Pedro": [],
      "1 Juan": [],
      "2 Juan": [],
      "3 Juan": [],
      "Judas": [],
      "Apocalipsis": []
    };

   function loadQuestions(book) {
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = `<h2>${book}</h2>`;
    if (!questions[book] || questions[book].length === 0) {
      quizDiv.innerHTML += "<p>No hay preguntas aún para este libro.</p>";
      return;
    }
    questions[book].forEach((item, index) => {
      let html = `<div class="question"><p>${item.q}</p>`;
      item.options.forEach((opt, i) => {
        html += `<button class="answer" onclick="checkAnswer('${book}',${index},${i})">${opt}</button>`;
      });
      html += `<p class="explanation" id="explanation-${book}-${index}"></p></div>`;
      quizDiv.innerHTML += html;
    });
  
    // Aquí sí se agrega el botón
    quizDiv.innerHTML += `<button onclick="showScore()">Puntuación obtenida</button>
                          <p id="final-score"></p>`;
  }

    let score = 0;
    function checkAnswer(book, qIndex, optIndex) {
      const item = questions[book][qIndex];
      const explanation = document.getElementById(`explanation-${book}-${qIndex}`);
      if(optIndex === item.correct) {
        explanation.innerText = item.explanation;
        score++; // suma un punto por respuesta correcta
      } else {
        explanation.innerText = "Incorrecto ❌. " + item.explanation;
      }
    }
    function showScore() {
      const finalScore = document.getElementById('final-score');
      finalScore.innerText = `Tu puntuación es: ${score} puntos`;
    }

  </script>
</body>
</html>
